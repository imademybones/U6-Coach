<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U6 Coach – Offline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap');
  body {
    font-family: 'DM Sans', sans-serif;
    background: #eef2f7;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; text-align: center;
  }
  .icon { font-size: 64px; margin-bottom: 16px; }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 0.04em;
    color: #1a3a6b; margin-bottom: 8px;
  }
  p { font-size: 14px; color: #666; max-width: 280px; line-height: 1.6; margin-bottom: 24px; }
  button {
    background: #1a3a6b; color: #fff; border: none;
    border-radius: 10px; padding: 13px 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 0.08em; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="icon">⚽</div>
  <h1>You're Offline</h1>
  <p>No internet connection right now. If you've opened the app before, try closing and reopening it — it should load from cache.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
